<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com tabelas - DIO.ME</title>
    <style>
        table tr:nth-child(even) {
            background-color: blueviolet
        }
        table tr:hover td {
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <table summary = "Tabela de idades dos alunos Dio.me" border="1" width = "250" align="center" >
        <caption>Tabela de idades dos alunos Dio.me</caption>
        <thead>
            <tr>
                <th title="Nome Completo">Nome</th>
                <th>Idade</th>
            </tr>
        </thead>
    <tbody>
        <tr id= "1">
            <td>João</td>
            <td>20</td>
        </tr>
        <tr id="2">
            <td>Maria</td>
            <td>21</td>
        </tr>
    <tr id="3">
        <td>kadu</td>
        <td>22</td>
    </tr>
    <tr id="4">
        <td>mariana</td>
        <td>23</td>
    </tr>
    <tr id="5">
        <td>lucas</td>
        <td>24</td>
    </tr>
    <tr id="6">
        <td>matue</td>
        <td>25</td>
    </tr>
    </tbody>
    <tfoot>
        <tr>
            <td>Total</td>
            <td>6</td>
        </tr>
    </tfoot>
    </table>
</body>
</html>
